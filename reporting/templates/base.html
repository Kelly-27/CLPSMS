<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Litein Police Station System{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            color: #2d3748;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.5);
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #3182ce, #805ad5); /* Colorful scrollbar! */
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #2b6cb0, #6b46c1);
        }

        .glass-navbar {
            background: linear-gradient(90deg, rgba(26, 41, 128, 0.9) 0%, rgba(38, 208, 206, 0.9) 100%) !important;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.3);
            position: sticky;
            top: 0;
            z-index: 1030;
            padding: 0.8rem 0;
            transition: all 0.3s ease;
        }

        .navbar-brand {
            color: #ffffff !important;
            font-weight: 700;
            letter-spacing: 0.5px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .navbar-brand i {
            color: #f6e05e; /* Bright gold shield */
            font-size: 1.8rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.85) !important;
            font-weight: 500;
            transition: 0.3s ease;
            padding: 0.6rem 1.2rem !important;
            border-radius: 8px;
            letter-spacing: 0.3px;
        }

        .nav-link:hover {
            color: #ffffff !important;
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        .logout-pill {
            background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
            color: #ffffff !important;
            border-radius: 50px;
            padding: 0.5rem 1.5rem !important;
            font-weight: 600;
            border: none;
            box-shadow: 0 4px 15px rgba(255, 75, 43, 0.4);
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logout-pill:hover {
            background: linear-gradient(135deg, #ff4b2b 0%, #ff416c 100%);
            box-shadow: 0 6px 20px rgba(255, 75, 43, 0.6);
            transform: translateY(-2px) scale(1.02);
        }

        .navbar-toggler {
            border-color: rgba(255,255,255,0.5) !important;
        }
        .navbar-toggler-icon {
            filter: invert(1);
        }

        main {
            flex: 1;
        }
    </style>
</head>
<body>

    {% block top_nav %}
    <nav class="navbar navbar-expand-lg glass-navbar">
        <div class="container-fluid px-4">

            <a class="navbar-brand fw-bold text-white" href="
    {% if request.user.is_authenticated %}
        {% if request.user.profile.role == 'police_commander' %}
            {% url 'commander_dashboard' %}
        {% elif request.user.profile.role == 'officer' %}
            {% url 'officer_dashboard' %}
        {% else %}
            {% url 'reporting_desk' %}
        {% endif %}
    {% else %}
        /
    {% endif %}
">
    <i class="bi bi-shield-fill-check text-warning me-2"></i> CLPSMS
</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center gap-3">
                    {% if user.is_authenticated %}

                        <li class="nav-item">
                            <span class="nav-link" style="cursor: default;">
                                <i class="bi bi-person-circle me-1" style="color: #68d391;"></i>
                                Welcome, {{ user.first_name|default:user.username }}
                            </span>
                        </li>

                        <li class="nav-item">
                            <form method="post" action="{% url 'logout' %}" class="m-0">
                                {% csrf_token %}
                                <button type="submit" class="btn nav-link logout-pill">
                                    <i class="bi bi-power"></i> Logout
                                </button>
                            </form>
                        </li>

                    {% endif %}
                </ul>
            </div>

        </div>
    </nav>
    {% endblock %}

    <main class="container mt-4 mb-5">
        {% block content %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
